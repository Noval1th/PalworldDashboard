<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pal Database · Palworld Server Dashboard</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%94%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0a1f26; --panel:#0f2d37; --panel2:#143a46; --edge:#1f5563;
    --ink:#e9fbfa; --muted:#8ab7bd; --accent:#1fc7bd; --accent2:#5fe6d9;
    --gold:#ffcb47; --good:#6fdc7a; --warn:#ffcb47; --bad:#ff7d6b;
    --rain:linear-gradient(90deg,#ff6b6b,#ffd23f,#6fdc7a,#57a9ff,#b189ff,#ff6b6b);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);overflow-x:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.45;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1100px;margin:0 auto;padding:20px 16px 48px}
  header{display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    background:linear-gradient(135deg,#10323d,#0b242c);border:1px solid var(--edge);
    border-radius:14px;padding:16px 18px;margin-bottom:18px}
  .logo{font-size:1.7rem;line-height:1}
  h1{margin:0;font-size:1.15rem;letter-spacing:.3px}
  header .sub{color:var(--muted);font-size:.78rem}
  .backbtn{margin-left:auto;display:inline-flex;align-items:center;gap:7px;text-decoration:none;
    border:1px solid #ffffff33;background:rgba(7,22,28,.30);color:var(--ink);border-radius:10px;
    padding:8px 14px;font-size:.85rem;font-weight:600;transition:.15s;white-space:nowrap}
  .backbtn:hover{border-color:var(--accent2);color:var(--accent2)}

  .panel{background:var(--panel);border:1px solid var(--edge);border-radius:12px;padding:16px 18px}
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .search{flex:1;min-width:210px;position:relative}
  .search input{width:100%;background:var(--panel2);border:1px solid var(--edge);color:var(--ink);
    border-radius:10px;padding:10px 12px 10px 34px;font:inherit;font-size:.9rem}
  .search input:focus{outline:none;border-color:var(--accent2)}
  .search .mag{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem}
  select{background:var(--panel2);border:1px solid var(--edge);color:var(--ink);border-radius:10px;
    padding:10px 12px;font:inherit;font-size:.9rem;cursor:pointer}
  select:focus{outline:none;border-color:var(--accent2)}
  .chipbtn{background:transparent;border:1px solid var(--edge);color:var(--muted);border-radius:99px;
    padding:7px 13px;font:inherit;font-size:.8rem;font-weight:600;cursor:pointer;transition:.15s}
  .chipbtn:hover{border-color:var(--accent2);color:var(--accent2)}
  .chipbtn.on{background:rgba(31,199,189,.15);border-color:var(--accent2);color:var(--accent2)}
  .count{color:var(--muted);font-size:.8rem;margin-left:auto}

  .tblwrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:.88rem}
  th,td{text-align:left;padding:8px 10px;white-space:nowrap}
  thead th{color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;
    border-bottom:1px solid var(--edge);cursor:pointer;user-select:none;position:sticky;top:0;
    background:var(--panel);z-index:1}
  thead th:hover{color:var(--accent2)}
  thead th.act{color:var(--accent2)}
  tbody tr{border-bottom:1px solid #ffffff0d}
  tbody tr:hover{background:var(--panel2)}
  td.r,th.r{text-align:right;font-variant-numeric:tabular-nums}
  .nm{font-weight:600}
  .sp{color:var(--muted);font-weight:400}
  .palink{color:inherit;text-decoration:none;border-bottom:1px dotted var(--muted)}
  .palink:hover{color:var(--accent2);border-bottom-color:var(--accent2)}
  .ivbar{display:inline-block;width:42px;height:5px;border-radius:99px;background:#0b2028;
    overflow:hidden;vertical-align:middle;margin-left:7px}
  .ivbar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .hi{color:var(--good);font-weight:700}
  /* Element chips. Palworld's own colour language, so a glance reads the same as it does in game. */
  .tchip{display:inline-block;padding:1px 7px;border-radius:99px;font-size:.7rem;font-weight:700;
    letter-spacing:.2px;border:1px solid currentColor;background:rgba(255,255,255,.055);margin-right:3px}
  .t-Neutral {color:#c3d2d4} .t-Fire    {color:#ff8358} .t-Water  {color:#57a9ff}
  .t-Grass   {color:#6fdc7a} .t-Electric{color:#ffd23f} .t-Ice    {color:#7fe3ff}
  .t-Ground  {color:#cf9a63} .t-Dark    {color:#b189ff} .t-Dragon {color:#e07ae0}
  /* Condensing level. Only ~5% of Pals have any stars at all, so an empty cell is the norm, not a gap. */
  .stars{color:var(--gold);letter-spacing:-1px;white-space:nowrap}
  .nostar{color:#ffffff26}
  tbody tr{cursor:pointer}

  /* ---- per-Pal detail popup ---- */
  /* Locking the body while the popup is open: without this the page behind scrolls when you flick at
     the modal, which on mobile reads as the popup itself failing to scroll. The padding compensates for
     the scrollbar the lock removes, so the layout doesn't jump sideways as the modal opens. */
  body.noscroll{overflow:hidden}
  .overlay{position:fixed;inset:0;background:rgba(3,12,16,.72);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;padding:18px;z-index:50;
    overscroll-behavior:contain}
  .overlay.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--edge);border-radius:14px;
    max-width:560px;width:100%;max-height:86vh;overflow-y:auto;padding:18px 20px 20px}
  .mhead{display:flex;align-items:flex-start;gap:12px;margin-bottom:4px}
  .mhead h2{margin:0;font-size:1.1rem;line-height:1.3}
  .mhead .msp{color:var(--muted);font-size:.85rem;font-weight:400}
  .mclose{margin-left:auto;background:transparent;border:1px solid var(--edge);color:var(--muted);
    border-radius:9px;width:30px;height:30px;font-size:1rem;line-height:1;cursor:pointer;flex:none}
  .mclose:hover{border-color:var(--accent2);color:var(--accent2)}
  .mtop{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  /* The species link is only in the popup now, so it has to say what it does - in the table it was
     discoverable by hovering a row, here it needs the label. */
  .pphint{color:var(--muted);font-size:.7rem;font-weight:400;white-space:nowrap}
  .grp{color:var(--muted);font-size:.7rem;text-transform:uppercase;letter-spacing:.6px;
    margin:16px 0 7px;padding-bottom:5px;border-bottom:1px solid var(--edge)}
  .kv{display:flex;justify-content:space-between;gap:14px;padding:4px 0;font-size:.87rem}
  .kv span:first-child{color:var(--muted)}
  .kv b{font-weight:600}
  .tags{display:flex;flex-wrap:wrap;gap:6px}
  .tag{background:var(--panel2);border:1px solid var(--edge);border-radius:8px;
    padding:5px 9px;font-size:.8rem}
  .tag .mel{font-weight:700;margin-right:5px}
  .tag .mpow{color:var(--muted);font-size:.74rem;margin-left:5px}
  /* Passive quality uses the GAME's colour language, not a traffic-light of our own invention:
     red below rank 1, white at 1-2, gold at 3, rainbow at 4+. White is the default tag styling, so
     the ordinary tier deliberately gets no class at all. */
  .tag.pbad{border-color:#ff7d6b66;color:#ffb0a4}
  .tag.pgold{border-color:var(--gold);color:var(--gold)}
  .tag.prainbow{border-color:transparent;font-weight:700;
    background:linear-gradient(var(--panel2),var(--panel2)) padding-box,
               var(--rain) border-box;
    background-size:auto,300% 100%;background-position:0 0,0 0;
    animation:rainedge 7s linear infinite}
  @keyframes rainedge{to{background-position:0 0,300% 0}}
  /* The gradient fill needs background-clip:text, and the transparent colour that makes it work would
     render the label INVISIBLE where that isn't supported - so the gradient only applies inside
     @supports, and the plain fallback is gold. */
  .tag.prainbow .rt{color:var(--gold)}
  @supports ((-webkit-background-clip:text) or (background-clip:text)){
    .tag.prainbow .rt{background:var(--rain);background-size:300% 100%;
      -webkit-background-clip:text;background-clip:text;color:transparent;
      animation:raintext 7s linear infinite}
  }
  @keyframes raintext{to{background-position:300% 0}}
  @media(prefers-reduced-motion:reduce){
    .tag.prainbow,.tag.prainbow .rt{animation:none}
  }
  /* Passives get a list rather than the chip row the moves use: each one carries a description, and
     descriptions don't wrap sensibly inside a flex-wrapped row of chips. */
  .tsub{color:var(--muted);font-size:.74rem;text-align:right;margin:-3px 0 3px}
  .plist{display:flex;flex-direction:column;gap:8px}
  .prow{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
  .prow .tag{flex:none}
  .pdesc{color:var(--muted);font-size:.8rem;line-height:1.35;flex:1;min-width:160px}
  .none{color:var(--muted);font-size:.83rem}

  .empty{color:var(--muted);text-align:center;padding:26px 8px}
  .foot{color:var(--muted);font-size:.76rem;text-align:center;margin-top:14px}
  @media(max-width:620px){
    .wrap{padding:14px 10px 36px}
    th,td{padding:7px 7px}
    .hidesm{display:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">📔</div>
    <div>
      <h1>Pal Database</h1>
      <div class="sub" id="sub">Loading…</div>
    </div>
    <a class="backbtn" href="./">← Back to dashboard</a>
  </header>

  <div class="panel">
    <div class="controls">
      <div class="search">
        <span class="mag">🔎</span>
        <input id="q" type="search" placeholder="Search nickname or species…" autocomplete="off">
      </div>
      <select id="owner"><option value="">All tamers</option></select>
      <select id="type"><option value="">All types</option></select>
      <!-- Passives are filterable but deliberately not shown as a column: they are breeding-stock detail,
           and rendering 1-4 of them per row would swamp the table. -->
      <select id="passive"><option value="">Any passive</option></select>
      <button class="chipbtn" id="fNick" title="Only Pals given a nickname">🏷️ Nicknamed</button>
      <button class="chipbtn" id="fFav" title="Favorited">⭐ Favorited</button>
      <button class="chipbtn" id="fLucky" title="Lucky (shiny)">✨ Lucky</button>
      <button class="chipbtn" id="fAlpha" title="Alpha">💀 Alpha</button>
      <span class="count" id="count"></span>
    </div>
    <div class="tblwrap"><table>
      <thead><tr id="head"></tr></thead>
      <tbody id="rows"></tbody>
    </table></div>
    <div class="foot" id="foot"></div>
  </div>
</div>

<div class="overlay" id="palOverlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="palTitle">
    <div class="mhead">
      <h2 id="palTitle"></h2>
      <button class="mclose" id="palClose" aria-label="Close">✕</button>
    </div>
    <div id="palBody"></div>
  </div>
</div>

<script>
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
// species link out to Palpedia; BOSS_/Hunter_/GYM_ records are human NPCs with no page
const PAL_NOLINK=/^(BOSS_|Hunter_|GYM_)/;
function palLink(sp){
  const t=esc(sp||'?');
  if(!sp||PAL_NOLINK.test(sp))return t;
  return `<a class="palink" href="https://www.palpedia.net/pals/${encodeURIComponent(sp)}" target="_blank" rel="noopener noreferrer" title="${t} on Palpedia">${t}</a>`;
}

// Only label the link when there IS one - Hunters and the like have no Palpedia page, and a hint
// pointing at plain text would be a lie.
const ppHint=sp=>(sp&&!PAL_NOLINK.test(sp))?'<span class="pphint">↗ Palpedia</span>':'';

const ELEMENTS=['Neutral','Fire','Water','Grass','Electric','Ice','Ground','Dark','Dragon'];
const typeChips=t=>(t||[]).map(e=>`<span class="tchip t-${esc(e)}">${esc(e)}</span>`).join('')||'<span class="sp">—</span>';
const starCell=n=>n>0?`<span class="stars" title="${n}-star condensed">${'★'.repeat(n)}</span>`
                     :'<span class="nostar">—</span>';

let PALS=[], sort={key:'iv',dir:-1}, filt={nick:false,fav:false,lucky:false,alpha:false};
const COLS=[
  ['name','Pal',''],
  ['types','Type',''],
  ['owner','Tamer',''],
  ['stars','★','r'],
  ['level','Lv','r'],
  ['iv','IV','r'],
  ['ivHp','HP','r hidesm'],
  ['ivShot','Atk','r hidesm'],
  ['ivDef','Def','r hidesm'],
];
const val=(p,k)=>{
  switch(k){
    case 'name':  return ((p.nick||p.species)||'').toLowerCase();
    case 'owner': return (p.owner||'').toLowerCase();
    case 'types': return ((p.types||[])[0]||'~').toLowerCase();  // '~' sorts typeless NPCs last
    case 'stars': return p.stars||0;
    default:      return p[k]==null?-1:p[k];
  }
};
function drawHead(){
  document.getElementById('head').innerHTML=COLS.map(([k,l,c])=>{
    const act=sort.key===k, ar=act?(sort.dir===1?' ▲':' ▼'):'';
    return `<th class="${c?c+' ':''}${act?'act':''}" data-k="${k}">${l}${ar}</th>`;
  }).join('');
}
function apply(){
  const q=document.getElementById('q').value.trim().toLowerCase();
  const own=document.getElementById('owner').value;
  const ty=document.getElementById('type').value;
  const pv=document.getElementById('passive').value;
  let rows=PALS.filter(p=>{
    if(own&&p.owner!==own)return false;
    if(ty&&!(p.types||[]).includes(ty))return false;
    if(pv&&!(p.passives||[]).includes(pv))return false;
    if(filt.nick&&!(p.nick&&String(p.nick).trim()))return false;
    if(filt.fav&&!p.favorite)return false;
    if(filt.lucky&&!p.lucky)return false;
    if(filt.alpha&&!p.alpha)return false;
    if(q){
      const hay=((p.nick||'')+' '+(p.species||'')).toLowerCase();
      if(hay.indexOf(q)<0)return false;
    }
    return true;
  });
  const k=sort.key,d=sort.dir;
  rows.sort((a,b)=>{const x=val(a,k),y=val(b,k);return (x<y?-1:x>y?1:0)*d || (a.nick||a.species||'').localeCompare(b.nick||b.species||'');});
  document.getElementById('count').textContent=rows.length===PALS.length
    ? `${PALS.length} Pals` : `${rows.length} of ${PALS.length} Pals`;
  const tb=document.getElementById('rows');
  if(!rows.length){ tb.innerHTML='<tr><td colspan="9"><div class="empty">No Pals match that.</div></td></tr>'; return; }
  tb.innerHTML=rows.slice(0,600).map(p=>{
    const g=p.gender==='Female'?' ♀':p.gender==='Male'?' ♂':'';
    const badges=(p.favorite?' <span title="Favorited">⭐</span>':'')
                +(p.lucky?' <span title="Lucky (shiny)">✨</span>':'')
                +(p.alpha?' <span title="Alpha">💀</span>':'');
    // Plain text here, not a Palpedia link: the whole row opens the detail popup, and a link inside it
    // competes for the same click. The link lives in the popup instead, where nothing else wants the click.
    const nm=p.nick?`<span class="nm">“${esc(p.nick)}”</span> <span class="sp">${esc(p.species)}</span>`
                   :`<span class="nm">${esc(p.species)}</span>`;
    return `<tr data-pid="${esc(p.pid)}">`
      +`<td>${nm}${badges}</td>`
      +`<td>${typeChips(p.types)}</td>`
      +`<td>${esc(p.owner)}</td>`
      +`<td class="r">${starCell(p.stars)}</td>`
      +`<td class="r">${p.level==null?'—':p.level}${g}</td>`
      +`<td class="r"><span class="${p.iv>=80?'hi':''}">${p.iv==null?'—':p.iv+'%'}</span>`
      +`<span class="ivbar"><i style="width:${Math.max(0,Math.min(100,p.iv||0))}%"></i></span></td>`
      +`<td class="r hidesm">${p.ivHp==null?'—':p.ivHp}</td>`
      +`<td class="r hidesm">${p.ivShot==null?'—':p.ivShot}</td>`
      +`<td class="r hidesm">${p.ivDef==null?'—':p.ivDef}</td>`
      +`</tr>`;
  }).join('');
  document.getElementById('foot').textContent=rows.length>600
    ? `Showing the first 600 of ${rows.length} — narrow it down with search or a tamer filter.` : '';
}
// ---- per-Pal detail popup ----
// PINFO[name] = {r:rank, d:description}. Description is optional - the UI must survive without it.
let MOVES={}, PINFO={};
const kv=(k,v)=>`<div class="kv"><span>${k}</span><b>${v}</b></div>`;

// Raw FriendshipPoint is close to meaningless on its own - "9,000 pts" tells you nothing about how far
// along a Pal is. These are the cumulative totals each Trust Level requires; the gaps widen sharply
// (6k between L0 and L1, 50k between L9 and L10), so a flat point count badly misrepresents progress.
const TRUST=[0,6000,13000,21000,30000,40000,55000,80000,110000,150000,200000];
function trust(b){
  b=b||0;
  let lvl=0;
  while(lvl<10&&b>=TRUST[lvl+1])lvl++;
  const base=TRUST[lvl], next=lvl<10?TRUST[lvl+1]:null;
  // Points can run past the level 10 threshold (209,000 seen live), so max level pins at 100%.
  return {lvl,next,pts:b,pct:next?Math.round(100*(b-base)/(next-base)):100};
}
function trustRow(b){
  const t=trust(b);
  if(!b)return kv('Trust level','<span class="sp">0 — not raised</span>');
  const bar=`<span class="ivbar"><i style="width:${t.pct}%"></i></span>`;
  const sub=t.next
    ? `${t.pts.toLocaleString()} / ${t.next.toLocaleString()} pts · ${t.pct}% to Level ${t.lvl+1}`
    : `${t.pts.toLocaleString()} pts · max level`;
  return kv('Trust level',`Level ${t.lvl}${bar}`)+`<div class="tsub">${sub}</div>`;
}
function moveTag(id){
  const m=MOVES[String(id).toLowerCase()];
  // An unknown id still renders, as its raw id - better a visible oddity than a silently dropped move.
  if(!m)return `<span class="tag">${esc(id)}</span>`;
  const el=m.element?`<span class="mel t-${esc(m.element)}">${esc(m.element)}</span>`:'';
  const pw=m.power?`<span class="mpow">${m.power}</span>`:'';
  return `<span class="tag" title="${esc(m.kind||'')}">${el}${esc(m.name)}${pw}</span>`;
}
// Palworld's own tiers: red below 1, white at 1-2, gold at 3, rainbow at 4+. An unranked passive is
// left white rather than guessed at - the table is complete today, but a game patch could add one.
function passiveTier(r){
  if(r==null)return '';
  if(r<1)return ' pbad';
  if(r>=4)return ' prainbow';
  if(r>=3)return ' pgold';
  return '';                       // ranks 1-2: the ordinary tier, default white
}
function passiveTag(n){
  const cls=passiveTier((PINFO[n]||{}).r);
  // The rainbow tier wraps its label so the gradient can be clipped to the text, which needs its own
  // element - the chip itself is already carrying the gradient border.
  const label=cls===' prainbow'?`<span class="rt">${esc(n)}</span>`:esc(n);
  return `<span class="tag${cls}">${label}</span>`;
}
// Printed in the popup rather than shown on hover: there is no hover on a phone, and the description
// is useful enough to be worth the vertical space.
function passiveRow(n){
  const d=(PINFO[n]||{}).d;
  return `<div class="prow">${passiveTag(n)}${d?`<span class="pdesc">${esc(d)}</span>`:''}</div>`;
}
function tagList(items,fn,emptyMsg){
  return items&&items.length?`<div class="tags">${items.map(fn).join('')}</div>`
                            :`<div class="none">${emptyMsg}</div>`;
}
function openPal(p){
  const g=p.gender==='Female'?'♀ Female':p.gender==='Male'?'♂ Male':'—';
  const badges=(p.favorite?' ⭐':'')+(p.lucky?' ✨':'')+(p.alpha?' 💀':'');
  document.getElementById('palTitle').innerHTML=
    (p.nick?`“${esc(p.nick)}”<div class="msp">${palLink(p.species)} ${ppHint(p.species)}</div>`
           :`${palLink(p.species)} <span class="msp">${ppHint(p.species)}</span>`)+badges;
  // MasteredWaza is every move the Pal has learned, which includes the ones currently slotted - so the
  // second list is the difference, not the raw field, or the same move would appear twice.
  const eq=p.moves||[], kn=(p.known||[]).filter(m=>!eq.includes(m));
  const ivRow=(lbl,v)=>kv(lbl,`${v==null?'—':v}<span class="ivbar"><i style="width:${Math.max(0,Math.min(100,v||0))}%"></i></span>`);
  // Pal Souls: total plus the per-stat split. Read from Rank_HP/Rank_Attack/Rank_Defence on the Pal -
  // NOT GotStatusPointList, which is player data and always reads 0 here.
  const sbd=Object.entries(p.soulbd||{}).map(([k,v])=>`${k} +${v}`).join(' · ');
  const souls=p.souls?`${p.souls}${sbd?` <span class="sp">(${sbd})</span>`:''}`:null;
  document.getElementById('palBody').innerHTML=
    `<div class="mtop">${typeChips(p.types)}${p.stars?starCell(p.stars):''}</div>`
    +`<div class="grp">Stats</div>`
    +kv('Tamer',esc(p.owner||'—'))
    +kv('Level',p.level==null?'—':p.level)
    +kv('Gender',g)
    +kv('Condensing',p.stars?`${p.stars}★`:'not condensed')
    +kv('Average IV',p.iv==null?'—':`<span class="${p.iv>=80?'hi':''}">${p.iv}%</span>`)
    +ivRow('HP IV',p.ivHp)+ivRow('Attack IV',p.ivShot)+ivRow('Defence IV',p.ivDef)
    +trustRow(p.bond)
    +kv('Pal Souls',souls||'<span class="sp">none</span>')
    +`<div class="grp">Equipped moves</div>`+tagList(eq,moveTag,'No moves equipped.')
    +(kn.length?`<div class="grp">Also known</div>`+tagList(kn,moveTag,''):'')
    +`<div class="grp">Passive skills</div>`
    +(p.passives&&p.passives.length
        ? `<div class="plist">${p.passives.map(passiveRow).join('')}</div>`
        : `<div class="none">No passive skills.</div>`);
  document.getElementById('palOverlay').classList.add('show');
  lockScroll(true);
}
function lockScroll(on){
  // Reserve the scrollbar's width before hiding it, or the whole page shifts right as the modal opens.
  const gap=window.innerWidth-document.documentElement.clientWidth;
  document.body.style.paddingRight=on&&gap>0?gap+'px':'';
  document.body.classList.toggle('noscroll',on);
}
const closePal=()=>{
  document.getElementById('palOverlay').classList.remove('show');
  lockScroll(false);
};

function boot(d){
  MOVES=d.moveTable||{}; PINFO=d.passiveTable||{};
  PALS=Array.isArray(d.pals)?d.pals:[];
  const owners=[...new Set(PALS.map(p=>p.owner).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
  const sel=document.getElementById('owner');
  owners.forEach(o=>{const op=document.createElement('option');op.value=o;op.textContent=o.trim();sel.appendChild(op);});
  const fill=(id,vals)=>{const s=document.getElementById(id);
    vals.forEach(v=>{const op=document.createElement('option');op.value=v;op.textContent=v;s.appendChild(op);});};
  // Types are limited to what is present - an element with no Pals is a dead-end filter.
  const present=new Set(PALS.flatMap(p=>p.types||[]));
  fill('type',ELEMENTS.filter(e=>present.has(e)));
  // Passives offer EVERY name the game knows (passiveAll), not just the ones owned here, so you can
  // pick any passive and get an honest empty result rather than the option not existing. Falls back to
  // the present-only set if an older pals.json without passiveAll is served.
  const passiveOpts=Array.isArray(d.passiveAll)&&d.passiveAll.length
    ? d.passiveAll
    : [...new Set(PALS.flatMap(p=>p.passives||[]))].sort((a,b)=>a.localeCompare(b));
  fill('passive',passiveOpts);
  const when=d.generatedAt?new Date(d.generatedAt):null;
  document.getElementById('sub').textContent=
    `${PALS.length} Pals across ${owners.length} tamers` + (when?` · updated ${when.toLocaleString()}`:'');
  drawHead(); apply();
}
fetch('./pals.json?t='+Date.now(),{cache:'no-store'})
  .then(r=>r.ok?r.json():Promise.reject(r.status))
  .then(boot)
  .catch(err=>{
    document.getElementById('sub').textContent='Unavailable';
    document.getElementById('rows').innerHTML=
      `<tr><td colspan="9"><div class="empty">Couldn't load the Pal list${err===404?' (not published yet)':''}.<br>Try again in a minute.</div></td></tr>`;
  });

document.getElementById('q').addEventListener('input',apply);
['owner','type','passive'].forEach(id=>document.getElementById(id).addEventListener('change',apply));
document.getElementById('head').addEventListener('click',e=>{
  const th=e.target.closest('[data-k]'); if(!th)return;
  const k=th.dataset.k;
  // numbers open descending (you want the best first), text ascending
  if(sort.key===k){ sort.dir*=-1; } else { sort={key:k,dir:(k==='name'||k==='owner')?1:-1}; }
  drawHead(); apply();
});
document.getElementById('rows').addEventListener('click',e=>{
  if(e.target.closest('a'))return;          // let the Palpedia link do its job
  const tr=e.target.closest('[data-pid]'); if(!tr)return;
  const p=PALS.find(x=>x.pid===tr.dataset.pid); if(p)openPal(p);
});
document.getElementById('palClose').addEventListener('click',closePal);
document.getElementById('palOverlay').addEventListener('click',e=>{
  if(e.target.id==='palOverlay')closePal();  // backdrop only, not the panel itself
});
document.addEventListener('keydown',e=>{ if(e.key==='Escape')closePal(); });

[['fNick','nick'],['fFav','fav'],['fLucky','lucky'],['fAlpha','alpha']].forEach(([id,key])=>{
  document.getElementById(id).addEventListener('click',e=>{
    filt[key]=!filt[key];
    e.currentTarget.classList.toggle('on',filt[key]);
    apply();
  });
});
</script>
</body>
</html>
